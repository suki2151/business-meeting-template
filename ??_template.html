<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>经营会议数据看板</title>
<script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
:root {
  --brand-dark: #06038D;
  --brand-bright: #00A9E0;
  --brand-dark-rgb: 6, 3, 141;
  --brand-bright-rgb: 0, 169, 224;
  --bg-primary: #ffffff;
  --bg-secondary: #f5f7fa;
  --bg-card: #ffffff;
  --bg-hover: #eef1f6;
  --border: #dde1e7;
  --border-light: #e8ecf1;
  --text-primary: #1a1a2e;
  --text-secondary: #5a6072;
  --text-muted: #8b919e;
  --accent: var(--brand-bright);
  --accent-dark: var(--brand-dark);
  --success: #00a854;
  --warning: #f5a623;
  --danger: #f04134;
  --info: #00a9e0;
  --shadow: 0 1px 4px rgba(0,0,0,0.06);
  --shadow-hover: 0 2px 12px rgba(0,0,0,0.1);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", "PingFang SC", sans-serif;
  background: var(--bg-secondary);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.5;
}

/* Topbar */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 32px; height: 56px;
  background: var(--brand-dark);
  color: #fff;
  position: sticky; top: 0; z-index: 100;
}
.topbar h1 { font-size: 18px; font-weight: 600; letter-spacing: 1px; }
.topbar .subtitle { font-size: 13px; opacity: 0.8; margin-left: 16px; }
.page-nav { display: flex; gap: 0; }
.page-nav button {
  padding: 10px 28px; border: none; background: transparent;
  color: rgba(255,255,255,0.7); cursor: pointer; font-size: 14px;
  transition: all 0.2s; font-family: inherit; border-bottom: 2px solid transparent;
  margin-bottom: -1px;
}
.page-nav button.active { color: #fff; border-bottom-color: var(--brand-bright); }
.page-nav button:hover:not(.active) { color: rgba(255,255,255,0.9); }

.container { max-width: 1440px; margin: 0 auto; padding: 24px 32px; }

/* ====== DATA PREP PAGE ====== */
.prep-page { display: none; }
.prep-page.active { display: block; }

.prep-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px;
  padding: 28px; margin-bottom: 20px; box-shadow: var(--shadow);
}
.prep-card h3 { font-size: 16px; margin-bottom: 6px; color: var(--brand-dark); }
.prep-card .desc { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; }

.upload-area {
  border: 2px dashed var(--border); border-radius: 8px;
  padding: 36px 20px; text-align: center; cursor: pointer;
  transition: all 0.3s; background: var(--bg-secondary);
  margin-bottom: 12px;
}
.upload-area:hover, .upload-area.dragover {
  border-color: var(--brand-bright); background: rgba(0,169,224,0.04);
}
.upload-area.loaded { border-color: var(--success); border-style: solid; background: rgba(0,168,84,0.03); }
.upload-area .icon { font-size: 32px; margin-bottom: 6px; }
.upload-area .text { color: var(--text-secondary); font-size: 14px; }
.upload-area .hint { color: var(--text-muted); font-size: 12px; margin-top: 2px; }
.upload-area .file-info { color: var(--success); font-size: 13px; margin-top: 6px; display: none; }
.upload-area.loaded .file-info { display: block; }
.upload-area.loaded .icon, .upload-area.loaded .text, .upload-area.loaded .hint { display: none; }

.date-row { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.date-row label { color: var(--text-primary); font-size: 14px; font-weight: 500; }
.date-row input[type="date"] {
  padding: 8px 14px; border: 1px solid var(--border); border-radius: 6px;
  background: var(--bg-card); color: var(--text-primary); font-size: 14px; font-family: inherit;
}
.date-row input[type="date"]:focus { outline: none; border-color: var(--brand-bright); }
.date-row .date-source { font-size: 12px; color: var(--text-muted); }

.btn {
  padding: 10px 28px; border: none; border-radius: 6px; font-size: 14px;
  cursor: pointer; font-weight: 500; font-family: inherit; transition: all 0.2s;
}
.btn-primary { background: var(--brand-bright); color: #fff; }
.btn-primary:hover { background: #0095c7; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-dark { background: var(--brand-dark); color: #fff; }
.btn-dark:hover { background: #05027a; }
.btn-outline {
  background: #fff; color: var(--brand-dark); border: 1px solid var(--brand-dark);
}
.btn-outline:hover { background: rgba(6,3,141,0.05); }
.btn-sm { padding: 5px 14px; font-size: 12px; }

.status-bar { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 14px; }
.status-tag {
  padding: 4px 12px; border-radius: 4px; font-size: 12px; font-weight: 500;
}
.status-tag.ok { background: rgba(0,168,84,0.1); color: var(--success); }
.status-tag.warn { background: rgba(245,166,35,0.1); color: var(--warning); }

/* Matching section */
.match-section { margin-top: 20px; }
.match-summary { font-size: 14px; color: var(--text-secondary); margin-bottom: 16px; }
.match-summary b { color: var(--brand-dark); }
.match-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.match-table th {
  background: var(--brand-dark); color: #fff; font-weight: 500;
  padding: 8px 10px; text-align: left;
}
.match-table td { padding: 8px 10px; border-bottom: 1px solid var(--border-light); }
.match-table tr:hover td { background: var(--bg-hover); }
.match-table .match-status { font-size: 12px; font-weight: 500; }
.match-status.confident { color: var(--success); }
.match-status.uncertain { color: var(--warning); }
.match-status.unmatched { color: var(--text-muted); }

.match-actions { display: flex; gap: 8px; margin-top: 16px; justify-content: center; }

/* ====== REPORT PAGE ====== */
.report-page { display: none; }
.report-page.active { display: block; }
.report-page .loading { text-align: center; padding: 80px; color: var(--text-muted); font-size: 15px; }

/* KPI Cards */
.kpi-row { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; margin-bottom: 24px; }
.kpi-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
  padding: 16px 18px; box-shadow: var(--shadow); position: relative; overflow: hidden;
}
.kpi-card::before {
  content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 3px;
  background: var(--brand-bright);
}
.kpi-card .label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
.kpi-card .value { font-size: 22px; font-weight: 700; color: var(--brand-dark); }
.kpi-card .value .unit { font-size: 12px; color: var(--text-muted); margin-left: 2px; }
.kpi-card .sub { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

/* Section */
.section { margin-bottom: 24px; }
.section-header {
  display: flex; align-items: center; justify-content: space-between;
  padding-bottom: 10px; margin-bottom: 16px; border-bottom: 2px solid var(--border-light);
}
.section-title { font-size: 16px; font-weight: 600; color: var(--brand-dark); }
.section-title .dot { color: var(--brand-bright); margin-right: 6px; }

/* Indicator switch */
.indicator-switch { display: flex; gap: 2px; }
.indicator-switch button {
  padding: 5px 14px; border: 1px solid var(--border); background: #fff;
  color: var(--text-secondary); cursor: pointer; font-size: 12px; font-family: inherit;
  transition: all 0.15s;
}
.indicator-switch button:first-child { border-radius: 4px 0 0 4px; }
.indicator-switch button:last-child { border-radius: 0 4px 4px 0; }
.indicator-switch button.active {
  background: var(--brand-bright); color: #fff; border-color: var(--brand-bright);
}
.indicator-switch button:hover:not(.active) { border-color: var(--brand-bright); color: var(--brand-dark); }

/* Charts */
.chart-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; box-shadow: var(--shadow); }
.chart-container { width: 100%; height: 360px; }

/* Filter bar */
.filter-bar {
  display: flex; gap: 16px; flex-wrap: wrap; align-items: center;
  margin-bottom: 16px; background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 8px; padding: 12px 16px; box-shadow: var(--shadow);
}
.filter-group { display: flex; align-items: center; gap: 6px; }
.filter-group label { font-size: 13px; color: var(--text-secondary); white-space: nowrap; font-weight: 500; }
.filter-group select {
  padding: 6px 10px; border: 1px solid var(--border); border-radius: 4px;
  font-size: 13px; font-family: inherit; color: var(--text-primary); background: #fff;
}
.filter-group select:focus { outline: none; border-color: var(--brand-bright); }

/* Month multi-select dropdown */
.month-dropdown { position: relative; display: inline-block; }
.month-dropdown .trigger {
  padding: 6px 10px; border: 1px solid var(--border); border-radius: 4px;
  font-size: 13px; cursor: pointer; background: #fff; color: var(--text-primary);
  min-width: 140px; text-align: left; white-space: nowrap;
}
.month-dropdown .trigger:hover { border-color: var(--brand-bright); }
.month-dropdown .panel {
  display: none; position: absolute; top: 100%; left: 0; z-index: 50;
  background: #fff; border: 1px solid var(--border); border-radius: 6px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.12); padding: 10px 14px; min-width: 180px;
}
.month-dropdown .panel.open { display: block; }
.month-dropdown .panel label {
  display: inline-flex; align-items: center; gap: 4px; margin: 3px 6px;
  font-size: 13px; cursor: pointer; color: var(--text-primary);
}

/* Table */
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th {
  background: var(--brand-dark); color: #fff; font-weight: 500;
  padding: 9px 12px; text-align: left; white-space: nowrap; position: sticky; top: 0;
}
.data-table td { padding: 8px 12px; border-bottom: 1px solid var(--border-light); }
.data-table tr:hover td { background: var(--bg-hover); }
.data-table .num { text-align: right; font-variant-numeric: tabular-nums; }
.data-table .highlight { font-weight: 600; color: var(--brand-dark); }

/* Tags */
.tag {
  display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 11px; font-weight: 500;
}
.tag-postpone { background: rgba(245,166,35,0.15); color: #d48900; }
.tag-new { background: rgba(0,168,84,0.12); color: #008040; }
.tag-delete { background: rgba(240,65,52,0.12); color: #c03028; }
.tag-advance { background: rgba(0,169,224,0.12); color: #0080b0; }

/* Expand */
.expand-btn { cursor: pointer; color: var(--brand-bright); user-select: none; font-size: 14px; font-weight: 600; }
.expand-btn:hover { color: var(--brand-dark); }
.expand-row { display: none; }
.expand-row.open { display: table-row; }
.expand-row td { background: var(--bg-secondary); padding: 12px 16px; font-size: 12px; color: var(--text-secondary); }

/* Modal */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.5); z-index: 200; justify-content: center; align-items: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: #fff; border-radius: 12px; padding: 28px; max-width: 800px;
  width: 92%; max-height: 85vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,0.15);
}
.modal h3 { margin-bottom: 16px; font-size: 18px; color: var(--brand-dark); }
.modal .close-btn {
  float: right; background: none; border: none; color: var(--text-muted);
  font-size: 22px; cursor: pointer; line-height: 1;
}
.modal .close-btn:hover { color: var(--text-primary); }

.scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
.scrollbar::-webkit-scrollbar-track { background: var(--bg-secondary); }
.scrollbar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<!-- ============================================================ -->
<!-- EMBEDDED DATA (fallback) -->
<!-- ============================================================ -->
<script id="embeddedData" type="application/json">{{DATA_PLACEHOLDER}}</script>

<!-- ============================================================ -->
<!-- TOPBAR -->
<!-- ============================================================ -->
<div class="topbar">
  <div>
    <h1 style="display:inline">经营会议数据看板</h1>
    <span class="subtitle" id="meetingDate"></span>
  </div>
  <div class="page-nav">
    <button onclick="switchPage('prep')" id="navPrep">数据准备</button>
    <button onclick="switchPage('report')" id="navReport">数据汇报</button>
  </div>
</div>

<!-- ============================================================ -->
<!-- DATA PREPARATION PAGE -->
<!-- ============================================================ -->
<div class="container prep-page active" id="prepPage">
  <div class="prep-card">
    <h3>上次会议数据</h3>
    <p class="desc">上传上次会议的 Excel 文件</p>
    <div class="upload-area" id="lastUpload" onclick="document.getElementById('lastFileInput').click()">
      <div class="icon">📂</div>
      <div class="text">点击或拖拽上传 上次会议.xlsx</div>
      <div class="hint">支持 .xlsx 格式</div>
      <div class="file-info" id="lastFileInfo"></div>
    </div>
    <input type="file" id="lastFileInput" accept=".xlsx" style="display:none" onchange="handleFile('last', this)">
  </div>

  <div class="prep-card">
    <h3>本次会议数据</h3>
    <p class="desc">上传本次会议最新的 Excel 文件</p>
    <div class="upload-area" id="currentUpload" onclick="document.getElementById('currentFileInput').click()">
      <div class="icon">📂</div>
      <div class="text">点击或拖拽上传 本次会议.xlsx</div>
      <div class="hint">支持 .xlsx 格式</div>
      <div class="file-info" id="currentFileInfo"></div>
    </div>
    <input type="file" id="currentFileInput" accept=".xlsx" style="display:none" onchange="handleFile('current', this)">
  </div>

  <div class="prep-card">
    <h3>会议日期</h3>
    <div class="date-row">
      <label>当前会议日期：</label>
      <input type="date" id="datePicker" onchange="onDateChange()">
      <span class="date-source" id="dateSource"></span>
    </div>
  </div>

  <div style="text-align:center;margin-top:24px;">
    <button class="btn btn-primary" id="parseBtn" onclick="startParsing()" style="font-size:16px;padding:12px 40px;">解析数据，准备匹配</button>
  </div>

  <!-- Contract Matching -->
  <div class="prep-card" id="matchCard" style="display:none;">
    <h3>待签合同自动匹配</h3>
    <p class="desc">根据合同名称、客户/甲方、金额自动匹配。请确认匹配结果。</p>
    <div id="matchContent"></div>
    <div class="match-actions">
      <button class="btn btn-dark" onclick="confirmMatch()">确认匹配，生成看板</button>
      <button class="btn btn-outline" onclick="skipMatch()">跳过，直接生成看板</button>
    </div>
  </div>

  <div class="status-bar" id="statusBar" style="margin-top: 16px;"></div>
</div>

<!-- ============================================================ -->
<!-- DATA REPORT PAGE -->
<!-- ============================================================ -->
<div class="container report-page" id="reportPage">
  <!-- ① KPI Cards -->
  <div class="kpi-row" id="kpiRow"></div>

  <!-- ② Company Summary Chart -->
  <div class="section">
    <div class="section-header">
      <div class="section-title"><span class="dot">◆</span>公司-汇总页</div>
      <div class="indicator-switch" id="indicatorSwitch1"></div>
    </div>
    <div class="chart-box"><div class="chart-container" id="companyChart"></div></div>
  </div>

  <!-- ③ Department Detail -->
  <div class="section">
    <div class="section-header">
      <div class="section-title"><span class="dot">◆</span>部门明细</div>
      <div class="indicator-switch" id="indicatorSwitch2"></div>
    </div>
    <div id="deptTableWrap" style="overflow-x:auto;"></div>
  </div>

  <!-- ④ Major Revenue & Collection Plan -->
  <div class="section">
    <div class="section-header">
      <div class="section-title"><span class="dot">◆</span>大额营收及收款计划</div>
    </div>
    <div class="filter-bar" id="majorFilterBar">
      <div class="filter-group">
        <label>月份：</label>
        <div class="month-dropdown" id="majorMonthDropdown">
          <div class="trigger" onclick="toggleMonthPanel('majorMonthPanel')" id="majorMonthTrigger">全部月份 ▾</div>
          <div class="panel" id="majorMonthPanel"></div>
        </div>
      </div>
      <div class="filter-group">
        <label>部门：</label>
        <select id="majorDeptFilter" onchange="renderMajorSection()">
          <option value="">全部部门</option>
        </select>
      </div>
      <div class="filter-group">
        <label>指标：</label>
        <select id="majorIndicatorFilter" onchange="renderMajorSection()"></select>
      </div>
    </div>
    <!-- 4-1 Department Summary -->
    <div style="margin-bottom:18px;">
      <div class="section-title" style="font-size:14px;">各部门指标情况</div>
      <div id="majorDeptSummary" style="overflow-x:auto;"></div>
    </div>
    <!-- 4-2 Major Projects TOP20 -->
    <div>
      <div class="section-title" style="font-size:14px;" id="majorTopTitle">大额项目 TOP20</div>
      <div id="majorTop20" style="overflow-x:auto;"></div>
    </div>
  </div>

  <!-- ⑤ Plan Transfer Analysis -->
  <div class="section">
    <div class="section-header">
      <div class="section-title"><span class="dot">◆</span>计划转移明细</div>
    </div>
    <div id="transferContent"></div>
  </div>

  <!-- ⑥ Receivables -->
  <div class="section">
    <div class="section-header">
      <div class="section-title"><span class="dot">◆</span>应收未收趋势</div>
    </div>
    <div id="receivablesContent" style="overflow-x:auto;"></div>
  </div>
</div>

<!-- ============================================================ -->
<!-- CONTRACT MATCH MODAL -->
<!-- ============================================================ -->
<div class="modal-overlay" id="matchModal">
  <div class="modal" id="matchModalContent"></div>
</div>

<script>
// ============================================================
// GLOBAL STATE
// ============================================================
const LS_LAST = 'dashboard_last_data';
const LS_CURRENT = 'dashboard_current_data';
const LS_DATE = 'dashboard_meeting_date';
const LS_MATCHED = 'dashboard_matched';

let allData = { last: null, current: null };
let currentPage = 'prep';
let globalIndicator = '产值';        // shared by section ② & ③

const INDICATORS = ['产值','自营产值','营收','自营营收','收款','净收款'];
const DEPT_ORDER = ['数字建造中心','智能运管中心','数智管理中心','福建分公司','广东分公司','产品研发中心','市场经营拓展中心'];
const MONTHS = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  loadFromStorage();
  if (!allData.last && !allData.current) { tryLoadEmbedded(); }
  buildMonthPanel();
  buildIndicatorSelects();
  buildDeptSelect();
  updatePrepUI();
  updateDateUI();
  setupDragDrop('lastUpload', 'last');
  setupDragDrop('currentUpload', 'current');

  if (allData.current) { switchPage('report'); }
  else { switchPage('prep'); }
});

function tryLoadEmbedded() {
  try {
    const el = document.getElementById('embeddedData');
    if (el && el.textContent && el.textContent !== '{{DATA_PLACEHOLDER}}') {
      allData = JSON.parse(el.textContent);
      saveToStorage();
    }
  } catch(e) {}
}

// ============================================================
// STORAGE
// ============================================================
function saveToStorage() {
  if (allData.last) localStorage.setItem(LS_LAST, JSON.stringify(allData.last));
  if (allData.current) localStorage.setItem(LS_CURRENT, JSON.stringify(allData.current));
  const dv = document.getElementById('datePicker')?.value;
  if (dv) localStorage.setItem(LS_DATE, dv);
}

function loadFromStorage() {
  try {
    const l = localStorage.getItem(LS_LAST), c = localStorage.getItem(LS_CURRENT);
    if (l) allData.last = JSON.parse(l);
    if (c) allData.current = JSON.parse(c);
  } catch(e) { allData = { last: null, current: null }; }
}

// ============================================================
// PAGE SWITCHING
// ============================================================
function switchPage(page) {
  currentPage = page;
  document.getElementById('prepPage').classList.toggle('active', page === 'prep');
  document.getElementById('reportPage').classList.toggle('active', page === 'report');
  document.getElementById('navPrep').classList.toggle('active', page === 'prep');
  document.getElementById('navReport').classList.toggle('active', page === 'report');

  if (page === 'prep') { updatePrepUI(); updateDateUI(); }
  if (page === 'report') {
    if (allData.current) { renderReport(); }
    else { document.getElementById('reportPage').innerHTML = '<div class="loading">请先在"数据准备"页面生成看板</div>'; }
  }
}

// ============================================================
// FILE HANDLING
// ============================================================
const fileContents = { last: null, current: null };

function handleFile(key, input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    fileContents[key] = new Uint8Array(e.target.result);
    const area = document.getElementById(key === 'last' ? 'lastUpload' : 'currentUpload');
    area.classList.add('loaded');
    const info = document.getElementById(key === 'last' ? 'lastFileInfo' : 'currentFileInfo');
    info.textContent = file.name + ' (' + (file.size / 1024).toFixed(0) + ' KB)';

    // Auto-extract date from current meeting file
    if (key === 'current') {
      try {
        const parsed = parseWorkbook(fileContents[key], key);
        if (parsed.date) {
          const d = strToDate(parsed.date);
          if (d) {
            document.getElementById('datePicker').value = d.toISOString().split('T')[0];
            document.getElementById('dateSource').textContent = '(从表格自动提取: ' + parsed.date + ')';
          }
        }
      } catch(err) {}
    }
  };
  reader.readAsArrayBuffer(file);
}

function setupDragDrop(areaId, key) {
  const area = document.getElementById(areaId);
  area.addEventListener('dragover', e => { e.preventDefault(); area.classList.add('dragover'); });
  area.addEventListener('dragleave', () => area.classList.remove('dragover'));
  area.addEventListener('drop', e => {
    e.preventDefault(); area.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) {
      const input = document.getElementById(key === 'last' ? 'lastFileInput' : 'currentFileInput');
      const dt = new DataTransfer(); dt.items.add(file); input.files = dt.files;
      handleFile(key, input);
    }
  });
}

// ============================================================
// EXCEL PARSING
// ============================================================
function cellText(sheet, r, c) {
  const addr = XLSX.utils.encode_cell({r: r-1, c: c-1});
  const cell = sheet[addr];
  if (!cell || cell.v == null) return '';
  if (cell.t === 's' && cell.w) return cell.w.trim();
  const s = String(cell.v).trim();
  return s.startsWith('#') ? '' : s;
}

function cellNum(sheet, r, c) {
  const t = cellText(sheet, r, c);
  if (!t || t === '-') return 0;
  let s = t.replace(/,/g, '').replace(/\s/g, '');
  if (s.endsWith('%')) return parseFloat(s) / 100;
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}

function cellDate(sheet, r, c) {
  const addr = XLSX.utils.encode_cell({r: r-1, c: c-1});
  const cell = sheet[addr];
  if (!cell) return null;
  if (cell.t === 'd' && cell.v instanceof Date) return cell.v;
  if (cell.v instanceof Date) return cell.v;
  if (typeof cell.w === 'string') {
    const m = cell.w.match(/(\d{4})[/\-](\d{1,2})[/\-](\d{1,2})/);
    if (m) return new Date(parseInt(m[1]), parseInt(m[2])-1, parseInt(m[3]));
  }
  return null;
}

function extractMeetingDate(wb) {
  const sn = wb.SheetNames.find(s => s.includes('PPT') && s.includes('总体情况'));
  if (!sn) return '';
  const sheet = wb.Sheets[sn];
  for (let r = 1; r <= 5; r++) {
    for (let c = 14; c <= 16; c++) {
      const d = cellDate(sheet, r, c);
      if (d) return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
    }
  }
  return '';
}

function strToDate(s) {
  if (!s) return null;
  const m = s.match(/(\d{4})\/(\d{1,2})\/(\d{1,2})/);
  if (m) return new Date(parseInt(m[1]), parseInt(m[2])-1, parseInt(m[3]));
  return null;
}

function findSections(sheet) {
  const ref = XLSX.utils.decode_range(sheet['!ref'] || 'A1');
  const maxRow = Math.min(ref.e.r + 1, 50);
  const sections = {};
  for (let r = 1; r <= maxRow; r++) {
    const m = cellText(sheet, r, 1).match(/^P(\d+)/);
    if (m) {
      const sec = 'P' + m[1]; let end = r + 1;
      while (end <= maxRow && !/^P\d+/.test(cellText(sheet, end, 1))) end++;
      sections[sec] = { start: r, end: end - 1 };
    }
  }
  return sections;
}

function findDataRows(sheet, sectionStart) {
  let headerRow = null;
  for (let r = sectionStart + 1; r < sectionStart + 5; r++) {
    if (cellText(sheet, r, 1).includes('部门')) { headerRow = r; break; }
  }
  if (!headerRow) return [];
  const rows = [];
  for (let r = headerRow + 1; r < headerRow + 15; r++) {
    const dept = cellText(sheet, r, 1);
    if (!dept || /^P\d+/.test(dept)) break;
    rows.push(r);
  }
  return rows;
}

function extractPptOverview(wb) {
  const sn = wb.SheetNames.find(s => s.includes('PPT') && s.includes('总体情况'));
  if (!sn) return { p3_revenue: [], p4_forecast: [], p5_quarterly: [], sections_found: [] };
  const sheet = wb.Sheets[sn], sections = findSections(sheet);
  const r = { p3_revenue: [], p4_forecast: [], p5_quarterly: [], sections_found: Object.keys(sections) };

  if (sections['P3']) {
    findDataRows(sheet, sections['P3'].start).forEach(rr => {
      const d = cellText(sheet, rr, 1);
      if (d) r.p3_revenue.push({ dept: d, revenue_current: cellNum(sheet, rr, 2), revenue_target: cellNum(sheet, rr, 3), revenue_rate: cellText(sheet, rr, 4), revenue_yoy: cellText(sheet, rr, 5), self_rev_current: cellNum(sheet, rr, 6), self_rev_target: cellNum(sheet, rr, 7), self_rev_rate: cellText(sheet, rr, 8), self_rev_yoy: cellText(sheet, rr, 9), collection: cellNum(sheet, rr, 10) });
    });
  }
  if (sections['P4']) {
    findDataRows(sheet, sections['P4'].start).forEach(rr => {
      const d = cellText(sheet, rr, 1);
      if (d) r.p4_forecast.push({ dept: d, current: cellNum(sheet, rr, 2), current_rate: cellText(sheet, rr, 3), backlog_forecast: cellNum(sheet, rr, 4), backlog_rate: cellText(sheet, rr, 5), pending_forecast: cellNum(sheet, rr, 6), pending_rate: cellText(sheet, rr, 7), full_year_forecast: cellNum(sheet, rr, 8), full_year_rate: cellText(sheet, rr, 9), prev_forecast: cellNum(sheet, rr, 10) });
    });
  }
  if (sections['P5']) {
    findDataRows(sheet, sections['P5'].start).forEach(rr => {
      const d = cellText(sheet, rr, 1);
      if (d) r.p5_quarterly.push({ dept: d, q1_initial_plan: cellNum(sheet, rr, 2), q1_end_plan: cellNum(sheet, rr, 3), q1_actual: cellNum(sheet, rr, 4), q1_rate: cellText(sheet, rr, 5), q2_prev_plan: cellNum(sheet, rr, 6), q2_current_plan: cellNum(sheet, rr, 7), q2_actual: cellNum(sheet, rr, 8), q2_rate: cellText(sheet, rr, 9) });
    });
  }
  return r;
}

function extractContracts(wb) {
  const sn = wb.SheetNames.find(s => s.includes('产值') && s.includes('收款计划'));
  if (!sn) return [];
  const sheet = wb.Sheets[sn];
  const ref = XLSX.utils.decode_range(sheet['!ref'] || 'A1');
  const out = [];
  for (let r = 5; r <= ref.e.r + 1; r++) {
    const cno = cellText(sheet, r, 3), cname = cellText(sheet, r, 4);
    if (!cno && !cname) continue;

    const selfRate = cellNum(sheet, r, 9);  // I col
    const taxRate = cellNum(sheet, r, 10);  // J col
    const client = cellText(sheet, r, 69);   // BQ col

    // Raw values
    const plan_产值 = [], plan_收款 = [], actual_产值 = [], actual_收款 = [];
    for (let m = 0; m < 12; m++) {
      plan_产值.push(cellNum(sheet, r, 27 + m));  // AA-AL
      plan_收款.push(cellNum(sheet, r, 53 + m));  // BA-BL
      actual_产值.push(cellNum(sheet, r, 83 + m)); // CA-CL
      actual_收款.push(cellNum(sheet, r, 109 + m));// DA-DL
    }

    // Computed values
    function safeDiv(a, b) { return b ? a / b : 0; }

    const plan_自营产值 = plan_产值.map(v => v * selfRate);
    const plan_营收 = plan_产值.map(v => safeDiv(v, 1 + taxRate));
    const plan_自营营收 = plan_自营产值.map(v => safeDiv(v, 1 + taxRate));
    const plan_净收款 = plan_收款.map(v => v * selfRate);

    const actual_自营产值 = actual_产值.map(v => v * selfRate);
    const actual_营收 = actual_产值.map(v => safeDiv(v, 1 + taxRate));
    const actual_自营营收 = actual_自营产值.map(v => safeDiv(v, 1 + taxRate));
    const actual_净收款 = actual_收款.map(v => v * selfRate);

    out.push({
      dept: cellText(sheet, r, 2), contract_no: cno, contract_name: cname,
      contract_amount: cellNum(sheet, r, 5), dept_amount: cellNum(sheet, r, 6),
      self_amount: cellNum(sheet, r, 8), self_rate: cellText(sheet, r, 9),
      tax_rate: cellText(sheet, r, 10), is_leading: cellText(sheet, r, 13),
      team: cellText(sheet, r, 14), manager: cellText(sheet, r, 15),
      contract_type: cellText(sheet, r, 16),
      confirmed_history: cellNum(sheet, r, 20), confirmed_2026: cellNum(sheet, r, 21),
      remaining_value: cellNum(sheet, r, 22),
      client,
      // All 6 indicators × 12 months (plan + actual)
      plan_产值, plan_自营产值, plan_营收, plan_自营营收, plan_收款, plan_净收款,
      actual_产值, actual_自营产值, actual_营收, actual_自营营收, actual_收款, actual_净收款,
      collected_history: cellNum(sheet, r, 49),
      collected_2026: cellNum(sheet, r, 50),
      remaining_collection: cellNum(sheet, r, 51),
    });
  }
  return out;
}

function extractTop10(wb) {
  const sn = wb.SheetNames.find(s => s.includes('TOP10'));
  if (!sn) return { summary: [], top10_list: [] };
  const sheet = wb.Sheets[sn];
  const r = { summary: [], top10_list: [] };
  for (let rr = 5; rr < 15; rr++) {
    const d = cellText(sheet, rr, 4);
    if (d) r.summary.push({ dept: d, contract_count: parseInt(cellNum(sheet, rr, 5)) || 0, plan_amount: cellNum(sheet, rr, 6) });
  }
  for (let rr = 5; rr < 15; rr++) {
    const name = cellText(sheet, rr, 9);
    if (name) r.top10_list.push({ dept: cellText(sheet, rr, 8), contract_name: name, contract_amount: cellNum(sheet, rr, 10), plan_amount: cellNum(sheet, rr, 11), actual: cellNum(sheet, rr, 12) });
  }
  return r;
}

function extractReceivables(wb) {
  const sn = wb.SheetNames.find(s => s.includes('应收未收'));
  if (!sn) return [];
  const sheet = wb.Sheets[sn];
  const ref = XLSX.utils.decode_range(sheet['!ref'] || 'A1');
  const out = [];
  for (let r = 4; r <= Math.min(ref.e.r + 1, 50); r++) {
    const d = cellText(sheet, r, 1);
    if (d) out.push({ dept: d, balance_feb11: cellNum(sheet, r, 3), balance_jan23: cellNum(sheet, r, 5), balance_2025end: cellNum(sheet, r, 7), balance_2024end: cellNum(sheet, r, 9) });
  }
  return out;
}

function extractCompanySummary(wb) {
  const sn = wb.SheetNames.find(s => s.includes('汇总'));
  if (!sn) return { '产值': [], '收款': [] };
  const sheet = wb.Sheets[sn];
  const ref = XLSX.utils.decode_range(sheet['!ref'] || 'A1');
  const out_产值 = [], out_收款 = [];
  let cur = null;
  for (let r = 1; r <= ref.e.r + 1; r++) {
    const c2 = cellText(sheet, r, 2);
    if (c2.includes('产值')) { cur = '产值'; continue; }
    if (c2.includes('收款')) { cur = '收款'; continue; }
    if (!DEPT_ORDER.includes(c2) && c2 !== '合计') continue;
    const months = [];
    for (let m = 0; m < 12; m++) {
      months.push({ plan: cellNum(sheet, r, 5 + m*2), actual: cellNum(sheet, r, 6 + m*2) });
    }
    const rd = { dept: c2, annual_plan: cellNum(sheet, r, 3), annual_actual: cellNum(sheet, r, 4), months };
    if (cur === '产值') out_产值.push(rd); else if (cur === '收款') out_收款.push(rd);
  }
  return { '产值': out_产值, '收款': out_收款 };
}

function parseWorkbook(data, key) {
  const wb = XLSX.read(data, { type: 'array' });
  const date = extractMeetingDate(wb);
  return {
    date,
    ppt_overview: extractPptOverview(wb),
    company_summary: extractCompanySummary(wb),
    contracts: extractContracts(wb),
    top10: extractTop10(wb),
    receivables_summary: extractReceivables(wb),
  };
}

// ============================================================
// CONTRACT MATCHING
// ============================================================
function buildContractMatch() {
  if (!allData.last?.contracts || !allData.current?.contracts) return null;

  const lastContracts = allData.last.contracts;
  const curContracts = allData.current.contracts;

  // Last meeting: contracts WITHOUT contract_no (pending)
  // Current meeting: contracts WITH contract_no (newly signed)
  const lastPending = lastContracts.filter(c => !c.contract_no && c.contract_name);
  const curNew = curContracts.filter(c => c.contract_no && c.contract_name);

  const matches = [];

  curNew.forEach(cur => {
    let bestScore = 0, bestMatch = null;
    lastPending.forEach(last => {
      const nameScore = nameSimilarity(cur.contract_name, last.contract_name);
      const clientMatch = cur.client && last.client && cur.client === last.client ? 1 : 0;
      const amountDiff = 1 - Math.min(Math.abs(cur.contract_amount - last.contract_amount) / Math.max(cur.contract_amount, last.contract_amount, 1), 1);
      const totalScore = nameScore * 0.5 + clientMatch * 0.3 + amountDiff * 0.2;
      if (totalScore > bestScore) { bestScore = totalScore; bestMatch = last; }
    });

    const confidence = bestScore >= 0.7 ? 'confident' : bestScore >= 0.4 ? 'uncertain' : 'unmatched';
    matches.push({ cur, lastMatch: bestMatch, score: bestScore, confidence });
  });

  return matches;
}

function showMatchResults() {
  const matches = buildContractMatch();
  const card = document.getElementById('matchCard');
  if (!matches || matches.length === 0) {
    card.style.display = 'none';
    return;
  }

  card.style.display = 'block';
  const confident = matches.filter(m => m.confidence === 'confident');
  const uncertain = matches.filter(m => m.confidence === 'uncertain');

  let rows = '';
  matches.forEach((m, i) => {
    const statusLabel = m.confidence === 'confident' ? '✓ 自动匹配' : m.confidence === 'uncertain' ? '⚠ 待确认' : '? 未匹配';
    const statusClass = m.confidence;
    rows += `<tr>
      <td><span class="match-status ${statusClass}">${statusLabel}</span></td>
      <td title="${esc(m.cur.contract_name)}">${trunc(m.cur.contract_name, 30)}</td>
      <td class="num">${fmt(m.cur.contract_amount)}</td>
      <td title="${esc(m.lastMatch?.contract_name || '')}">${trunc(m.lastMatch?.contract_name || '-', 30)}</td>
      <td class="num">${m.lastMatch ? fmt(m.lastMatch.contract_amount) : '-'}</td>
      <td>${m.cur.client || '-'}</td>
      <td class="num">${(m.score*100).toFixed(0)}%</td>
    </tr>`;
  });

  document.getElementById('matchContent').innerHTML = `
    <div class="match-summary">
      本次新增有合同编号的记录 <b>${matches.length}</b> 条；
      自动匹配 <b style="color:var(--success)">${confident.length}</b> 条；
      待确认 <b style="color:var(--warning)">${uncertain.length}</b> 条
    </div>
    <div style="overflow-x:auto;"><table class="match-table">
      <thead><tr><th>状态</th><th>本次合同</th><th>金额(万)</th><th>匹配上期合同</th><th>金额(万)</th><th>甲方</th><th>相似度</th></tr></thead>
      <tbody>${rows}</tbody>
    </table></div>`;
}

function startParsing() {
  if (!fileContents.current) { alert('请先上传本次会议文件'); return; }

  // Parse current meeting first
  try { allData.current = parseWorkbook(fileContents.current, 'current'); } catch(e) { alert('解析本次会议文件失败: ' + e.message); return; }

  // Parse last meeting if available
  if (fileContents.last) {
    try { allData.last = parseWorkbook(fileContents.last, 'last'); } catch(e) { alert('解析上次会议文件失败: ' + e.message); return; }
  }

  // Override date from picker
  const dv = document.getElementById('datePicker')?.value;
  if (dv) {
    const d = new Date(dv + 'T00:00:00');
    allData.current.date = d.getFullYear() + '/' + (d.getMonth()+1) + '/' + d.getDate();
    if (allData.last) allData.last.date = allData.current.date;
  }

  updatePrepUI();

  // Check if contract matching is needed
  if (allData.last && allData.last.contracts) {
    showMatchResults();
  } else {
    generateDashboard();
  }
}

// ============================================================
// HELPERS: get indicator data from a contract
// ============================================================
function getPlanArray(c, indicator) {
  switch(indicator) {
    case '产值': return c.plan_产值;
    case '自营产值': return c.plan_自营产值;
    case '营收': return c.plan_营收;
    case '自营营收': return c.plan_自营营收;
    case '收款': return c.plan_收款;
    case '净收款': return c.plan_净收款;
    default: return c.plan_产值;
  }
}

function getActualArray(c, indicator) {
  switch(indicator) {
    case '产值': return c.actual_产值;
    case '自营产值': return c.actual_自营产值;
    case '营收': return c.actual_营收;
    case '自营营收': return c.actual_自营营收;
    case '收款': return c.actual_收款;
    case '净收款': return c.actual_净收款;
    default: return c.actual_产值;
  }
}

  let html = '<div style="margin-bottom:6px;"><label style="font-size:12px;cursor:pointer;"><input type="checkbox" checked onchange="toggleAllMonths(this)"> 全选</label></div>';

  });
  panel.innerHTML = html;

function toggleAllMonths(cb) {
  document.querySelectorAll('.majorMonthCb').forEach(c => c.checked = cb.checked);
  onMonthChange();
}

function toggleMonthPanel(id) {
  const p = document.getElementById(id);
  p.classList.toggle('open');
  // Close on outside click
  if (p.classList.contains('open')) {
    setTimeout(() => {
      document.addEventListener('click', function closeMonth(e) {
        if (!p.parentElement.contains(e.target)) { p.classList.remove('open'); document.removeEventListener('click', closeMonth); }
      });
    }, 10);
  }
}

function onMonthChange() {
  const cbs = document.querySelectorAll('.majorMonthCb');
  const sel = [...cbs].filter(c => c.checked).map(c => parseInt(c.value));
  const trig = document.getElementById('majorMonthTrigger');
  if (sel.length === 12) trig.textContent = '全部月份 ▾';
  else if (sel.length === 0) trig.textContent = '未选择 ▾';
  else trig.textContent = sel.map(i => MONTHS[i]).join(',') + ' ▾';
  renderMajorSection();
}

function getSelectedMonths() {

}

// ① KPI Cards
function renderKPIs(d) {
  const contracts = d.contracts || [];
  const indicator = globalIndicator;
  const planTotal = contracts.reduce((s, c) => s + getPlanArray(c, indicator).reduce((a,b)=>a+b,0), 0);
  const actualTotal = contracts.reduce((s, c) => s + getActualArray(c, indicator).reduce((a,b)=>a+b,0), 0);

  // Compute totals for all 6 indicators for cards
  const cards = INDICATORS.map(ind => {
    const p = contracts.reduce((s, c) => s + getPlanArray(c, ind).reduce((a,b)=>a+b,0), 0);
    const a = contracts.reduce((s, c) => s + getActualArray(c, ind).reduce((a,b)=>a+b,0), 0);
    return { ind, plan: p, actual: a };
  });

  document.getElementById('kpiRow').innerHTML = cards.map(c => `
    <div class="kpi-card">
      <div class="label">${c.ind}</div>
      <div class="value">${fmt(c.actual)}<span class="unit">万元</span></div>
      <div class="sub">年度计划 ${fmt(c.plan)}万</div>
    </div>
  `).join('');
}

  initCompanyChart(d);
}

function initCompanyChart(d) {
  const el = document.getElementById('companyChart');
  if (!el) return;
  const chart = echarts.init(el);

  const contracts = d.contracts || [];
  const indicator = globalIndicator;
  const planMonthly = new Array(12).fill(0);
  const actualMonthly = new Array(12).fill(0);

  contracts.forEach(c => {
    getPlanArray(c, indicator).forEach((v, i) => { planMonthly[i] += v; });
    getActualArray(c, indicator).forEach((v, i) => { actualMonthly[i] += v; });
  });

  chart.setOption({
    tooltip: { trigger: 'axis' },
    legend: { data: ['计划', '完成'], top: 0, textStyle: { color: '#5a6072' } },
    grid: { left: 60, right: 30, top: 40, bottom: 30 },
    xAxis: { type: 'category', data: MONTHS, axisLabel: { color: '#5a6072' }, axisLine: { lineStyle: { color: '#dde1e7' } } },
    yAxis: { type: 'value', name: '万元', nameTextStyle: { color: '#5a6072' }, axisLabel: { color: '#5a6072' }, splitLine: { lineStyle: { color: '#e8ecf1' } } },
    series: [
      { name: '计划', type: 'line', data: planMonthly.map(v => +v.toFixed(2)), smooth: true, lineStyle: { color: '#06038D', width: 2 }, itemStyle: { color: '#06038D' }, symbol: 'circle', symbolSize: 6 },
      { name: '完成', type: 'line', data: actualMonthly.map(v => +v.toFixed(2)), smooth: true, lineStyle: { color: '#00A9E0', width: 2 }, itemStyle: { color: '#00A9E0' }, symbol: 'diamond', symbolSize: 6 },
    ]
  });
  window.addEventListener('resize', () => chart.resize());
}

// ③ Department Detail Table
function renderDeptDetail(d) {
  const contracts = d.contracts || [];
  const indicator = globalIndicator;

  const deptData = {};
  DEPT_ORDER.forEach(dn => { deptData[dn] = { plan: new Array(12).fill(0), actual: new Array(12).fill(0) }; });
  contracts.forEach(c => {
    const dn = c.dept;
    if (!deptData[dn]) return;
    getPlanArray(c, indicator).forEach((v, i) => { deptData[dn].plan[i] += v; });
    getActualArray(c, indicator).forEach((v, i) => { deptData[dn].actual[i] += v; });
  });

  let rows = '';
  DEPT_ORDER.forEach((dn, idx) => {
    const dd = deptData[dn];
    const planTotal = dd.plan.reduce((a,b)=>a+b,0);
    const actualTotal = dd.actual.reduce((a,b)=>a+b,0);
    rows += `<tr>
      <td>${dn}</td>
      <td class="num">${fmt(planTotal)}</td>
      <td class="num">${fmt(actualTotal)}</td>
      <td class="num">${planTotal > 0 ? (actualTotal/planTotal*100).toFixed(0)+'%' : '-'}</td>
      <td><div class="bar-mini" style="background:#e8ecf1;height:8px;border-radius:4px;width:120px;"><div style="background:${actualTotal >= planTotal ? '#00a854' : '#00A9E0'};height:8px;border-radius:4px;width:${Math.min(100, planTotal > 0 ? (actualTotal/planTotal*100) : 0)}%;"></div></div></td>
    </tr>`;
  });

  document.getElementById('deptTableWrap').innerHTML = `
    <table class="data-table">
      <thead><tr><th>部门</th><th>计划合计(万)</th><th>完成合计(万)</th><th>完成率</th><th>进度</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ④ Major Revenue & Collection Plan Section
function renderMajorSection() {
  const d = allData.current;
  if (!d) return;
  const contracts = d.contracts || [];
  const selMonths = getSelectedMonths();
  const selDept = document.getElementById('majorDeptFilter')?.value || '';
  const selIndicator = document.getElementById('majorIndicatorFilter')?.value || '产值';

  if (selMonths.length === 0) {
    document.getElementById('majorDeptSummary').innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:20px;">请选择月份</p>';
    document.getElementById('majorTop20').innerHTML = '';
    return;
  }

  const monthLabels = selMonths.map(i => MONTHS[i]).join('、');
  document.getElementById('majorTopTitle').textContent = (selDept ? selDept : '全公司') + ' ' + monthLabels + ' ' + selIndicator + ' TOP20';

  // 4-1: Department Summary (dept filter NOT effective)
  const deptSummary = {};
  DEPT_ORDER.forEach(dn => { deptSummary[dn] = { count: 0, plan: 0 }; });

  contracts.forEach(c => {
    const dn = c.dept;
    if (!deptSummary[dn]) return;
    const plans = getPlanArray(c, selIndicator);
    let hasValue = false, sum = 0;
    selMonths.forEach(m => {
      if (plans[m] > 0.001) { hasValue = true; sum += plans[m]; }
    });
    if (hasValue) { deptSummary[dn].count++; deptSummary[dn].plan += sum; }
  });

  let deptRows = '';
  DEPT_ORDER.forEach(dn => {
    const ds = deptSummary[dn];
    deptRows += `<tr><td>${dn}</td><td class="num">${ds.count}</td><td class="num">${fmt(ds.plan)}</td></tr>`;
  });

  document.getElementById('majorDeptSummary').innerHTML = `
    <table class="data-table">
      <thead><tr><th>部门</th><th>合同数</th><th>${monthLabels} ${selIndicator}计划(万)</th></tr></thead>
      <tbody>${deptRows}</tbody>
    </table>`;

  // 4-2: TOP20 (all 3 filters effective)
  let candidates = [];
  contracts.forEach(c => {
    if (selDept && c.dept !== selDept) return;
    const plans = getPlanArray(c, selIndicator);
    const actuals = getActualArray(c, selIndicator);
    let planSum = 0, actualSum = 0;
    selMonths.forEach(m => { planSum += plans[m]; actualSum += actuals[m]; });
    if (planSum > 0.001) {
      candidates.push({ dept: c.dept, contract_name: c.contract_name, plan: planSum, actual: actualSum });
    }
  });

  candidates.sort((a, b) => b.plan - a.plan);
  const top20 = candidates.slice(0, 20);

  let topRows = '';
  top20.forEach((t, i) => {
    topRows += `<tr><td>${i+1}</td><td>${t.dept}</td><td title="${esc(t.contract_name)}">${trunc(t.contract_name, 40)}</td><td class="num">${fmt(t.plan)}</td><td class="num">${fmt(t.actual)}</td></tr>`;
  });

  document.getElementById('majorTop20').innerHTML = `
    <table class="data-table">
      <thead><tr><th>#</th><th>部门</th><th>合同名称</th><th>计划值(万)</th><th>完成值(万)</th></tr></thead>
      <tbody>${topRows || '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);">无匹配数据</td></tr>'}</tbody>
    </table>`;
}

// ⑤ Plan Transfer Analysis (reuse existing logic)
function renderTransferSection() {
  const d = allData.current;
  if (!allData.last) {
    document.getElementById('transferContent').innerHTML = '<p style="color:var(--text-muted);">需要同时加载两次会议数据</p>';
    return;
  }

  const td = computeTransferAnalysis(d);
  let allChanges = [];
  Object.entries(td).forEach(([dept, data]) => {
    data.changes.forEach(c => { allChanges.push({ ...c, dept }); });
  });
  allChanges.sort((a, b) => b.amount - a.amount);

  let rows = '';
  allChanges.forEach(c => {
    const tagClass = c.type === '推迟' ? 'tag-postpone' : c.type === '新增' ? 'tag-new' : c.type === '删除' ? 'tag-delete' : 'tag-advance';
    rows += `<tr class="change-row" data-type="${c.type}">
      <td>${c.dept}</td><td title="${esc(c.contractName)}">${trunc(c.contractName, 30)}</td>
      <td><span class="tag ${tagClass}">${c.type}</span></td>
      <td>${c.fromMonth ? c.fromMonth+'月' : '-'}</td><td>${c.toMonth ? c.toMonth+'月' : '-'}</td>
      <td class="num">${fmt(c.amount)}</td>
    </tr>`;
  });

  document.getElementById('transferContent').innerHTML = `
    <div class="filter-bar">
      <button class="btn btn-sm" style="background:var(--brand-dark);color:#fff;" onclick="filterChanges('全部', this)">全部</button>
      <button class="btn btn-sm btn-outline" onclick="filterChanges('推迟', this)">推迟</button>
      <button class="btn btn-sm btn-outline" onclick="filterChanges('新增', this)">新增</button>
      <button class="btn btn-sm btn-outline" onclick="filterChanges('删除', this)">删除</button>
    </div>
    <div style="overflow-x:auto;"><table class="data-table">
      <thead><tr><th>部门</th><th>合同名称</th><th>变化类型</th><th>原计划月</th><th>目标月</th><th>金额(万)</th></tr></thead>
      <tbody>${rows || '<tr><td colspan="6" style="text-align:center;color:var(--text-muted);">暂无变化</td></tr>'}</tbody>
    </table></div>`;
}

function filterChanges(type, btn) {
  document.querySelectorAll('#transferContent .btn').forEach(b => {
    if (type === '全部' && b.textContent === '全部') { b.style.background = 'var(--brand-dark)'; b.style.color = '#fff'; }
    else { b.style.background = '#fff'; b.style.color = 'var(--brand-dark)'; }
  });
  document.querySelectorAll('.change-row').forEach(row => {
    row.style.display = (type === '全部' || row.dataset.type === type) ? '' : 'none';
  });
}

function computeTransferAnalysis(d) {
  if (!allData.current || !allData.last) return {};
  const curC = allData.current.contracts || [], lastC = allData.last.contracts || [];
  const lastByNo = {};
  lastC.forEach(c => { lastByNo[c.contract_no] = c; });

  const deptResult = {};
  DEPT_ORDER.forEach(dn => { deptResult[dn] = { transferIn: 0, transferOut: 0, inDetails: [], outDetails: [], changes: [] }; });

  curC.forEach(cur => {
    const last = lastByNo[cur.contract_no];
    if (!last) return;
    const dept = cur.dept;
    if (!deptResult[dept]) return;

    for (let m = 0; m < 12; m++) {
      const delta = (cur.plan_产值[m] || 0) - (last.plan_产值[m] || 0);
      if (Math.abs(delta) < 0.01) continue;
      if (delta < 0) {
        let found = false;
        for (let n = m+1; n < 12; n++) {
          const d2 = (cur.plan_产值[n] || 0) - (last.plan_产值[n] || 0);
          if (d2 > 0.01) {
            const amt = Math.min(-delta, d2);
            deptResult[dept].transferOut += amt;
            deptResult[dept].changes.push({ contractName: cur.contract_name, type: '推迟', fromMonth: m+1, toMonth: n+1, amount: amt, isOut: true });
            found = true;
          }
        }
        if (!found) deptResult[dept].changes.push({ contractName: cur.contract_name, type: '删除', fromMonth: m+1, toMonth: null, amount: -delta, isOut: true });
      } else {
        let found = false;
        for (let n = 0; n < m; n++) {
          const d2 = (cur.plan_产值[n] || 0) - (last.plan_产值[n] || 0);
          if (d2 < -0.01) {
            const amt = Math.min(delta, -d2);
            deptResult[dept].transferIn += amt;
            deptResult[dept].changes.push({ contractName: cur.contract_name, type: '推迟', fromMonth: n+1, toMonth: m+1, amount: amt, isIn: true });
            found = true;
          }
        }
        if (!found) deptResult[dept].changes.push({ contractName: cur.contract_name, type: '新增', fromMonth: null, toMonth: m+1, amount: delta, isIn: true });
      }
    }
  });
  Object.keys(deptResult).forEach(dn => { deptResult[dn].changes.sort((a,b) => b.amount - a.amount); });
  return deptResult;
}

// ⑥ Receivables
function renderReceivablesSection() {
  const d = allData.current;
  const recv = d?.receivables_summary;
  if (!recv || recv.length === 0) {

    <td class="num">${fmt(r.balance_feb11)}</td>

  document.getElementById('receivablesContent').innerHTML = `

      <tbody>${rows}</tbody>
    </table>`;
}

// ============================================================
// UTILS
// ============================================================
function fmt(n) {
  if (n == null || isNaN(n)) return '0';
  return parseFloat(n).toLocaleString('zh-CN', { maximumFractionDigits: 0 });
}

function nameSimilarity(a, b) {
  if (!a || !b) return 0;
  const norm = s => s.replace(/[（(].*?[）)]/g, '').replace(/[，,、。；;：:\-_/\\]/g, '').replace(/\s+/g, '').toLowerCase();
  const na = norm(a), nb = norm(b);
  if (na === nb) return 1.0;
  const grams = s => { const g = new Set(); for (let i = 0; i < s.length-1; i++) g.add(s.substring(i, i+2)); return g; };
  const ga = grams(na), gb = grams(nb);
  let intersection = 0;
  ga.forEach(g => { if (gb.has(g)) intersection++; });
  const union = ga.size + gb.size - intersection;
  return union > 0 ? intersection / union : 0;
}

function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function trunc(s, n) { return s && s.length > n ? s.substring(0, n) + '...' : (s || ''); }
