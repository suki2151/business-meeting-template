<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>经营会议数据看板</title>
<script src="https://cdn.bootcdn.net/ajax/libs/echarts/5.5.0/echarts.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
:root {
  --bg-primary: #0a1628;
  --bg-secondary: #0f1e36;
  --bg-card: #132742;
  --bg-card-hover: #1a3355;
  --border: #1e3a5f;
  --border-light: #2a4a7f;
  --text-primary: #e8edf5;
  --text-secondary: #8fa4c4;
  --text-muted: #5a7090;
  --accent: #1a73e8;
  --accent-light: #4d94f5;
  --accent-glow: rgba(26, 115, 232, 0.3);
  --success: #00c853;
  --warning: #ff9800;
  --danger: #ff5252;
  --info: #00bcd4;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", "PingFang SC", sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  line-height: 1.5;
}

.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 32px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 100;
}
.topbar h1 { font-size: 20px; font-weight: 700; letter-spacing: 2px; }
.topbar .subtitle { color: var(--text-secondary); font-size: 13px; margin-left: 12px; }

.tab-group { display: flex; gap: 4px; }
.tab-btn {
  padding: 8px 24px; border: 1px solid var(--border); background: transparent;
  color: var(--text-secondary); cursor: pointer; font-size: 14px;
  border-radius: 4px; transition: all 0.2s;
}
.tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.tab-btn:hover:not(.active) { border-color: var(--accent-light); color: var(--text-primary); }
.tab-btn.prep { border-color: var(--success); color: var(--success); }
.tab-btn.prep.active { background: var(--success); color: #fff; border-color: var(--success); }

.container { max-width: 1440px; margin: 0 auto; padding: 24px 32px; }

/* Data Prep Page */
.prep-page { display: none; }
.prep-page.active { display: block; }
.prep-section {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
  padding: 24px; margin-bottom: 20px;
}
.prep-section h3 { font-size: 16px; margin-bottom: 16px; color: var(--accent-light); }
.prep-section .desc { font-size: 13px; color: var(--text-muted); margin-bottom: 12px; }

.upload-area {
  border: 2px dashed var(--border); border-radius: 8px;
  padding: 40px 20px; text-align: center; cursor: pointer;
  transition: all 0.3s; background: rgba(15, 30, 54, 0.5);
  margin-bottom: 12px;
}
.upload-area:hover, .upload-area.dragover {
  border-color: var(--accent-light); background: rgba(26, 115, 232, 0.05);
}
.upload-area.loaded { border-color: var(--success); border-style: solid; background: rgba(0, 200, 83, 0.05); }
.upload-area .icon { font-size: 36px; margin-bottom: 8px; }
.upload-area .text { color: var(--text-secondary); font-size: 14px; }
.upload-area .hint { color: var(--text-muted); font-size: 12px; margin-top: 4px; }
.upload-area .file-info { color: var(--success); font-size: 13px; margin-top: 8px; display: none; }
.upload-area.loaded .file-info { display: block; }
.upload-area.loaded .icon, .upload-area.loaded .text, .upload-area.loaded .hint { display: none; }

.date-row {
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
}
.date-row label { color: var(--text-secondary); font-size: 14px; white-space: nowrap; }
.date-row input[type="date"] {
  padding: 8px 12px; border: 1px solid var(--border); border-radius: 4px;
  background: var(--bg-secondary); color: var(--text-primary); font-size: 14px;
  font-family: inherit;
}
.date-row .date-source { font-size: 12px; color: var(--text-muted); }

.btn-primary {
  padding: 10px 32px; background: var(--accent); color: #fff; border: none;
  border-radius: 6px; font-size: 15px; cursor: pointer; font-weight: 600;
  transition: all 0.2s; font-family: inherit;
}
.btn-primary:hover { background: var(--accent-light); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

.status-bar {
  display: flex; gap: 16px; flex-wrap: wrap; margin-top: 16px;
}
.status-tag {
  padding: 4px 12px; border-radius: 4px; font-size: 12px;
  background: rgba(26, 115, 232, 0.15); color: var(--accent-light);
}
.status-tag.ok { background: rgba(0, 200, 83, 0.15); color: var(--success); }
.status-tag.warn { background: rgba(255, 152, 0, 0.15); color: var(--warning); }

/* KPI Cards */
.kpi-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 24px; }
.kpi-card {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px;
  padding: 20px 24px; position: relative; overflow: hidden;
}
.kpi-card::after {
  content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
  background: var(--accent);
}
.kpi-card.warning::after { background: var(--warning); }
.kpi-card.success::after { background: var(--success); }
.kpi-card .label { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
.kpi-card .value { font-size: 28px; font-weight: 700; }
.kpi-card .value .unit { font-size: 14px; color: var(--text-muted); margin-left: 4px; }
.kpi-card .sub { font-size: 12px; color: var(--text-muted); margin-top: 4px; }

/* Section */
.section { margin-bottom: 28px; }
.section-title {
  font-size: 16px; font-weight: 600; padding: 12px 0; border-bottom: 2px solid var(--border);
  margin-bottom: 16px; color: var(--text-primary);
}
.section-title .dot { color: var(--accent); margin-right: 8px; }

/* Charts */
.chart-box { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
.chart-container { width: 100%; height: 360px; }

/* Table */
.data-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.data-table th {
  background: var(--bg-secondary); color: var(--text-secondary); font-weight: 500;
  padding: 10px 12px; text-align: left; border-bottom: 2px solid var(--border);
  white-space: nowrap; position: sticky; top: 0;
}
.data-table td {
  padding: 8px 12px; border-bottom: 1px solid rgba(30, 58, 95, 0.5);
}
.data-table tr:hover td { background: rgba(26, 115, 232, 0.05); }
.data-table .num { text-align: right; font-variant-numeric: tabular-nums; }

/* Filters */
.filter-bar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-btn {
  padding: 6px 16px; border: 1px solid var(--border); background: transparent;
  color: var(--text-secondary); cursor: pointer; border-radius: 4px; font-size: 13px;
  transition: all 0.2s;
}
.filter-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* Tags */
.tag {
  display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 12px;
  font-weight: 500;
}
.tag-postpone { background: rgba(255,152,0,0.2); color: var(--warning); }
.tag-new { background: rgba(0,200,83,0.2); color: var(--success); }
.tag-delete { background: rgba(255,82,82,0.2); color: var(--danger); }
.tag-advance { background: rgba(0,188,212,0.2); color: var(--info); }

/* Expand toggle */
.expand-btn { cursor: pointer; color: var(--accent-light); user-select: none; font-size: 14px; }
.expand-btn:hover { color: var(--accent); }
.expand-row { display: none; }
.expand-row.open { display: table-row; }
.expand-row td { background: rgba(10, 22, 40, 0.5); padding: 12px 16px; font-size: 12px; color: var(--text-secondary); }

/* Modal */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  background: rgba(0,0,0,0.7); z-index: 200; justify-content: center; align-items: center;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px;
  padding: 24px; max-width: 700px; width: 90%; max-height: 80vh; overflow-y: auto;
}
.modal h3 { margin-bottom: 16px; font-size: 18px; }
.modal .close-btn {
  float: right; background: none; border: none; color: var(--text-secondary);
  font-size: 20px; cursor: pointer;
}

/* Comparison grid */
.compare-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
.compare-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
.compare-value { font-size: 20px; font-weight: 700; }
.compare-diff { font-size: 13px; margin-top: 2px; }
.diff-up { color: var(--success); }
.diff-down { color: var(--danger); }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg-primary); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.loading { text-align: center; padding: 60px; color: var(--text-muted); }
.empty-state { text-align: center; padding: 80px 20px; }
.empty-state .big-icon { font-size: 48px; margin-bottom: 16px; }
.empty-state p { color: var(--text-muted); font-size: 14px; margin-bottom: 8px; }
</style>
</head>
<body>

<script id="embeddedData" type="application/json">{{DATA_PLACEHOLDER}}</script>

<div class="topbar">
  <div>
    <h1 style="display:inline">经营会议数据看板</h1>
    <span class="subtitle" id="meetingDate"></span>
  </div>
  <div class="tab-group">
    <button class="tab-btn" onclick="switchTab('last')">上次会议</button>
    <button class="tab-btn active" onclick="switchTab('current')">本次会议</button>
    <button class="tab-btn prep" onclick="switchTab('prep')">数据准备</button>
  </div>
</div>

<!-- ============================================================ -->
<!-- DATA PREPARATION PAGE -->
<!-- ============================================================ -->
<div class="container prep-page active" id="prepPage">
  <div class="prep-section">
    <h3>上次会议数据</h3>
    <p class="desc">上传上次会议的Excel文件（例如：上次经营会议的数据表格）</p>
    <div class="upload-area" id="lastUpload" onclick="document.getElementById('lastFileInput').click()">
      <div class="icon">📂</div>
      <div class="text">点击或拖拽上传 上次会议.xlsx</div>
      <div class="hint">支持 .xlsx 格式</div>
      <div class="file-info" id="lastFileInfo"></div>
    </div>
    <input type="file" id="lastFileInput" accept=".xlsx" style="display:none" onchange="handleFile('last', this)">
  </div>

  <div class="prep-section">
    <h3>本次会议数据</h3>
    <p class="desc">上传本次会议最新的Excel文件（包含最新经营数据）</p>
    <div class="upload-area" id="currentUpload" onclick="document.getElementById('currentFileInput').click()">
      <div class="icon">📂</div>
      <div class="text">点击或拖拽上传 本次会议.xlsx</div>
      <div class="hint">支持 .xlsx 格式</div>
      <div class="file-info" id="currentFileInfo"></div>
    </div>
    <input type="file" id="currentFileInput" accept=".xlsx" style="display:none" onchange="handleFile('current', this)">
  </div>

  <div class="prep-section">
    <h3>会议日期</h3>
    <div class="date-row">
      <label for="datePicker">当前会议日期：</label>
      <input type="date" id="datePicker" onchange="onDateChange()">
      <span class="date-source" id="dateSource"></span>
    </div>
  </div>

  <div style="text-align:center; margin-top: 24px;">
    <button class="btn-primary" id="generateBtn" onclick="generateDashboard()">生成看板</button>
  </div>

  <div class="status-bar" id="statusBar" style="margin-top: 16px; justify-content: center;"></div>
</div>

<!-- ============================================================ -->
<!-- DASHBOARD PAGE -->
<!-- ============================================================ -->
<div class="container" id="app" style="display:none;">
  <div class="loading">请先在"数据准备"页面上传文件并生成看板</div>
</div>

<!-- Modal for contract matching confirmation -->
<div class="modal-overlay" id="matchModal">
  <div class="modal" id="matchModalContent"></div>
</div>

<script>
// ============================================================
// DATA LAYER — localStorage keys
// ============================================================
const LS_LAST = 'dashboard_last_data';
const LS_CURRENT = 'dashboard_current_data';
const LS_DATE = 'dashboard_meeting_date';
const LS_FILE_NAMES = 'dashboard_file_names';

let allData = { last: null, current: null };
let currentTab = 'prep';

// ============================================================
// INIT
// ============================================================
document.addEventListener('DOMContentLoaded', () => {
  // Try to load from localStorage first
  loadFromStorage();

  // If no localStorage data, try embedded data
  if (!allData.last && !allData.current) {
    try {
      const el = document.getElementById('embeddedData');
      if (el && el.textContent && el.textContent !== '{{DATA_PLACEHOLDER}}') {
        const embedded = JSON.parse(el.textContent);
        allData = embedded;
        saveToStorage();
      }
    } catch(e) { /* no embedded data */ }
  }

  updatePrepUI();
  updateDateUI();

  // Drag-and-drop for upload areas
  setupDragDrop('lastUpload', 'last');
  setupDragDrop('currentUpload', 'current');

  // Default to showing prep page if no data, else current meeting
  if (allData.current) {
    switchTab('current');
  } else {
    switchTab('prep');
  }
});

// ============================================================
// EXCEL PARSING (ported from build_data.py)
// ============================================================
function cellText(sheet, r, c) {
  const addr = XLSX.utils.encode_cell({r: r-1, c: c-1});
  const cell = sheet[addr];
  if (!cell) return '';
  if (cell.v == null) return '';
  if (cell.t === 's' && cell.w) return cell.w.trim();
  const s = String(cell.v).trim();
  if (s.startsWith('#')) return '';
  return s;
}

function cellNum(sheet, r, c) {
  const t = cellText(sheet, r, c);
  if (t === '' || t === '-') return 0;
  let s = t.replace(/,/g, '').replace(/\s/g, '');
  if (s.endsWith('%')) return parseFloat(s.replace('%', '')) / 100;
  const n = parseFloat(s);
  return isNaN(n) ? 0 : n;
}

function cellDate(sheet, r, c) {
  const addr = XLSX.utils.encode_cell({r: r-1, c: c-1});
  const cell = sheet[addr];
  if (!cell) return null;
  if (cell.t === 'd' && cell.v instanceof Date) return cell.v;
  if (cell.v instanceof Date) return cell.v;
  if (typeof cell.w === 'string') {
    const m = cell.w.match(/(\d{4})[/\-\/](\d{1,2})[/\-\/](\d{1,2})/);
    if (m) return new Date(parseInt(m[1]), parseInt(m[2])-1, parseInt(m[3]));
  }
  return null;
}

function extractMeetingDate(wb) {
  const sheetName = wb.SheetNames.find(s => s.includes('PPT') && s.includes('总体情况'));
  if (!sheetName) return '';
  const sheet = wb.Sheets[sheetName];
  for (let r = 1; r <= 5; r++) {
    for (let c = 14; c <= 16; c++) {
      const d = cellDate(sheet, r, c);
      if (d) return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
    }
  }
  return '';
}

function strToDate(s) {
  if (!s) return null;
  const parts = s.split('/');
  if (parts.length === 3) return new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
  return null;
}

function formatDate(date) {
  if (!date) return '';
  const d = date instanceof Date ? date : new Date(date);
  return `${d.getFullYear()}/${d.getMonth()+1}/${d.getDate()}`;
}

function findSections(sheet) {
  const ref = XLSX.utils.decode_range(sheet['!ref'] || 'A1');
  const maxRow = Math.min(ref.e.r + 1, 50);
  const sections = {};
  for (let r = 1; r <= maxRow; r++) {
    const c1 = cellText(sheet, r, 1);
    const m = c1.match(/^P(\d+)/);
    if (m) {
      const section = 'P' + m[1];
      let end = r + 1;
      while (end <= maxRow) {
        const next = cellText(sheet, end, 1);
        if (/^P\d+/.test(next)) break;
        end++;
      }
      sections[section] = { start: r, end: end - 1 };
    }
  }
  return sections;
}

function findDataRows(sheet, sectionStart) {
  let headerRow = null;
  for (let r = sectionStart + 1; r < sectionStart + 5; r++) {
    const c1 = cellText(sheet, r, 1);
    if (c1.includes('部门')) { headerRow = r; break; }
  }
  if (!headerRow) return [];
  const rows = [];
  for (let r = headerRow + 1; r < headerRow + 15; r++) {
    const dept = cellText(sheet, r, 1);
    if (!dept || /^P\d+/.test(dept)) break;
    rows.push(r);
  }
  return rows;
}

function extractPptOverview(wb) {
  const sheetName = wb.SheetNames.find(s => s.includes('PPT') && s.includes('总体情况'));
  if (!sheetName) return { p3_revenue: [], p4_forecast: [], p5_quarterly: [], sections_found: [] };
  const sheet = wb.Sheets[sheetName];
  const sections = findSections(sheet);
  const result = {
    p3_revenue: [], p4_forecast: [], p5_quarterly: [],
    sections_found: Object.keys(sections),
  };

  if (sections['P3']) {
    const rows = findDataRows(sheet, sections['P3'].start);
    rows.forEach(r => {
      const dept = cellText(sheet, r, 1);
      if (dept) {
        result.p3_revenue.push({
          dept,
          revenue_current: cellNum(sheet, r, 2),
          revenue_target: cellNum(sheet, r, 3),
          revenue_rate: cellText(sheet, r, 4),
          revenue_yoy: cellText(sheet, r, 5),
          self_rev_current: cellNum(sheet, r, 6),
          self_rev_target: cellNum(sheet, r, 7),
          self_rev_rate: cellText(sheet, r, 8),
          self_rev_yoy: cellText(sheet, r, 9),
          collection: cellNum(sheet, r, 10),
        });
      }
    });
  }

  if (sections['P4']) {
    const rows = findDataRows(sheet, sections['P4'].start);
    rows.forEach(r => {
      const dept = cellText(sheet, r, 1);
      if (dept) {
        result.p4_forecast.push({
          dept,
          current: cellNum(sheet, r, 2),
          current_rate: cellText(sheet, r, 3),
          backlog_forecast: cellNum(sheet, r, 4),
          backlog_rate: cellText(sheet, r, 5),
          pending_forecast: cellNum(sheet, r, 6),
          pending_rate: cellText(sheet, r, 7),
          full_year_forecast: cellNum(sheet, r, 8),
          full_year_rate: cellText(sheet, r, 9),
          prev_forecast: cellNum(sheet, r, 10),
        });
      }
    });
  }

  if (sections['P5']) {
    const rows = findDataRows(sheet, sections['P5'].start);
    rows.forEach(r => {
      const dept = cellText(sheet, r, 1);
      if (dept) {
        result.p5_quarterly.push({
          dept,
          q1_initial_plan: cellNum(sheet, r, 2),
          q1_end_plan: cellNum(sheet, r, 3),
          q1_actual: cellNum(sheet, r, 4),
          q1_rate: cellText(sheet, r, 5),
          q2_prev_plan: cellNum(sheet, r, 6),
          q2_current_plan: cellNum(sheet, r, 7),
          q2_actual: cellNum(sheet, r, 8),
          q2_rate: cellText(sheet, r, 9),
        });
      }
    });
  }

  return result;
}

function extractContracts(wb) {
  const sheetName = wb.SheetNames.find(s => s.includes('产值') && s.includes('收款计划'));
  if (!sheetName) return [];
  const sheet = wb.Sheets[sheetName];
  const ref = XLSX.utils.decode_range(sheet['!ref'] || 'A1');
  const contracts = [];

  for (let r = 5; r <= ref.e.r + 1; r++) {
    const contract_no = cellText(sheet, r, 3);
    const contract_name = cellText(sheet, r, 4);
    if (!contract_no && !contract_name) continue;

    const monthly_plan = [], monthly_actual = [];
    const monthly_collection_plan = [], monthly_collection_actual = [];
    for (let m = 0; m < 12; m++) {
      monthly_plan.push(cellNum(sheet, r, 27 + m));
      monthly_actual.push(cellNum(sheet, r, 83 + m));
      monthly_collection_plan.push(cellNum(sheet, r, 53 + m));
      monthly_collection_actual.push(cellNum(sheet, r, 109 + m));
    }

    contracts.push({
      dept: cellText(sheet, r, 2),
      contract_no, contract_name,
      contract_amount: cellNum(sheet, r, 5),
      dept_amount: cellNum(sheet, r, 6),
      self_amount: cellNum(sheet, r, 8),
      self_rate: cellText(sheet, r, 9),
      tax_rate: cellText(sheet, r, 10),
      is_leading: cellText(sheet, r, 13),
      team: cellText(sheet, r, 14),
      manager: cellText(sheet, r, 15),
      contract_type: cellText(sheet, r, 16),
      confirmed_history: cellNum(sheet, r, 20),
      confirmed_2026: cellNum(sheet, r, 21),
      remaining_value: cellNum(sheet, r, 22),
      monthly_plan, monthly_actual,
      monthly_collection_plan, monthly_collection_actual,
      collected_history: cellNum(sheet, r, 49),
      collected_2026: cellNum(sheet, r, 50),
      remaining_collection: cellNum(sheet, r, 51),
    });
  }
  return contracts;
}

function extractTop10(wb) {
  const sheetName = wb.SheetNames.find(s => s.includes('TOP10'));
  if (!sheetName) return { summary: [], top10_list: [] };
  const sheet = wb.Sheets[sheetName];
  const result = { summary: [], top10_list: [] };

  for (let r = 5; r < 15; r++) {
    const dept = cellText(sheet, r, 4);
    const count = parseInt(cellNum(sheet, r, 5)) || 0;
    const plan = cellNum(sheet, r, 6);
    if (dept) result.summary.push({ dept, contract_count: count, plan_amount: plan });
  }

  for (let r = 5; r < 15; r++) {
    const dept = cellText(sheet, r, 8);
    const name = cellText(sheet, r, 9);
    const amount = cellNum(sheet, r, 10);
    const plan = cellNum(sheet, r, 11);
    const actual = cellNum(sheet, r, 12);
    if (name) result.top10_list.push({ dept, contract_name: name, contract_amount: amount, plan_amount: plan, actual });
  }
  return result;
}

function extractReceivables(wb) {
  const sheetName = wb.SheetNames.find(s => s.includes('应收未收'));
  if (!sheetName) return [];
  const sheet = wb.Sheets[sheetName];
  const ref = XLSX.utils.decode_range(sheet['!ref'] || 'A1');
  const result = [];
  for (let r = 4; r <= Math.min(ref.e.r + 1, 50); r++) {
    const dept = cellText(sheet, r, 1);
    if (dept) {
      result.push({
        dept,
        balance_feb11: cellNum(sheet, r, 3),
        balance_jan23: cellNum(sheet, r, 5),
        balance_2025end: cellNum(sheet, r, 7),
        balance_2024end: cellNum(sheet, r, 9),
      });
    }
  }
  return result;
}

function extractCompanySummary(wb) {
  const sheetName = wb.SheetNames.find(s => s.includes('汇总'));
  if (!sheetName) return { '产值': [], '收款': [] };
  const sheet = wb.Sheets[sheetName];
  const ref = XLSX.utils.decode_range(sheet['!ref'] || 'A1');
  const validDepts = ['数字建造中心','智能运管中心','数智管理中心','福建分公司','广东分公司','产品研发中心','市场经营拓展中心','合计'];
  const result_产值 = [], result_收款 = [];
  let currentSection = null;

  for (let r = 1; r <= ref.e.r + 1; r++) {
    const c2 = cellText(sheet, r, 2);
    if (c2.includes('产值')) { currentSection = '产值'; continue; }
    if (c2.includes('收款')) { currentSection = '收款'; continue; }
    if (!validDepts.includes(c2)) continue;

    const months = [];
    for (let m = 0; m < 12; m++) {
      months.push({
        plan: cellNum(sheet, r, 5 + m * 2),
        actual: cellNum(sheet, r, 6 + m * 2),
      });
    }

    const rowData = {
      dept: c2,
      annual_plan: cellNum(sheet, r, 3),
      annual_actual: cellNum(sheet, r, 4),
      months,
    };

    if (currentSection === '产值') result_产值.push(rowData);
    else if (currentSection === '收款') result_收款.push(rowData);
  }

  return { '产值': result_产值, '收款': result_收款 };
}

function extractContractCheck(wb) {
  const sheetName = wb.SheetNames.find(s => s.includes('合同检查'));
  if (!sheetName) return [];
  const sheet = wb.Sheets[sheetName];
  const ref = XLSX.utils.decode_range(sheet['!ref'] || 'A1');
  const result = [];
  for (let r = 2; r <= ref.e.r + 1; r++) {
    const cno = cellText(sheet, r, 1);
    if (cno) {
      result.push({
        contract_no: cno,
        remaining: cellNum(sheet, r, 2),
        status: cellText(sheet, r, 3),
      });
    }
  }
  return result;
}

function parseWorkbook(data, key) {
  const wb = XLSX.read(data, { type: 'array' });
  const date = extractMeetingDate(wb);
  const parsed = {
    date,
    ppt_overview: extractPptOverview(wb),
    company_summary: extractCompanySummary(wb),
    contracts: extractContracts(wb),
    top10: extractTop10(wb),
    receivables_summary: extractReceivables(wb),
    contract_check: extractContractCheck(wb),
  };

  // Cross-reference: 本次 P4 prev_forecast from last meeting
  if (key === 'current' && allData.last) {
    const lastP3 = allData.last.ppt_overview.p3_revenue;
    const deptMap = {};
    lastP3.forEach(r => { deptMap[r.dept] = r; });

    parsed.ppt_overview.p4_forecast.forEach(row => {
      if (deptMap[row.dept]) {
        row.prev_forecast = deptMap[row.dept].revenue_current || 0;
      } else if (row.dept === '合计') {
        const total = lastP3.find(r => r.dept === '合计');
        if (total) row.prev_forecast = total.revenue_current || 0;
      }
    });
  }

  return parsed;
}

function saveToStorage() {
  if (allData.last) localStorage.setItem(LS_LAST, JSON.stringify(allData.last));
  if (allData.current) localStorage.setItem(LS_CURRENT, JSON.stringify(allData.current));
  const dateVal = document.getElementById('datePicker')?.value;
  if (dateVal) localStorage.setItem(LS_DATE, dateVal);
}

function loadFromStorage() {
  try {
    const lastStr = localStorage.getItem(LS_LAST);
    const curStr = localStorage.getItem(LS_CURRENT);
    if (lastStr) allData.last = JSON.parse(lastStr);
    if (curStr) allData.current = JSON.parse(curStr);
  } catch(e) {
    allData = { last: null, current: null };
  }
}

// ============================================================
// FILE HANDLING
// ============================================================
const fileContents = { last: null, current: null };
const fileNames = { last: null, current: null };

function handleFile(key, input) {
  const file = input.files[0];
  if (!file) return;
  fileNames[key] = file.name;

  const reader = new FileReader();
  reader.onload = function(e) {
    fileContents[key] = new Uint8Array(e.target.result);
    const area = document.getElementById(key === 'last' ? 'lastUpload' : 'currentUpload');
    area.classList.add('loaded');
    const info = document.getElementById(key === 'last' ? 'lastFileInfo' : 'currentFileInfo');
    info.textContent = file.name + ' (' + (file.size / 1024).toFixed(0) + ' KB)';

    // Auto-parse to get date
    try {
      const parsed = parseWorkbook(fileContents[key], key);
      if (parsed.date && key === 'current') {
        const d = strToDate(parsed.date);
        if (d) {
          document.getElementById('datePicker').value = d.toISOString().split('T')[0];
          document.getElementById('dateSource').textContent = '(从当前会议表格中自动提取: ' + parsed.date + ')';
        }
      }
    } catch(err) {
      console.log('Auto-parse for date failed:', err);
    }
  };
  reader.readAsArrayBuffer(file);
}

function setupDragDrop(areaId, key) {
  const area = document.getElementById(areaId);
  area.addEventListener('dragover', e => { e.preventDefault(); area.classList.add('dragover'); });
  area.addEventListener('dragleave', () => area.classList.remove('dragover'));
  area.addEventListener('drop', e => {
    e.preventDefault();
    area.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) {
      const input = document.getElementById(key === 'last' ? 'lastFileInput' : 'currentFileInput');
      const dt = new DataTransfer();
      dt.items.add(file);
      input.files = dt.files;
      handleFile(key, input);
    }
  });
}

function onDateChange() {
  const val = document.getElementById('datePicker').value;
  if (val) {
    localStorage.setItem(LS_DATE, val);
    document.getElementById('dateSource').textContent = '(手动设置)';
  }
}

function updatePrepUI() {
  const statusBar = document.getElementById('statusBar');
  let tags = '';

  if (allData.last) {
    tags += '<span class="status-tag ok">上次会议数据: 已加载 (' +
      allData.last.contracts.length + ' 个合同)</span>';
  } else {
    tags += '<span class="status-tag warn">上次会议数据: 未加载</span>';
  }

  if (allData.current) {
    tags += '<span class="status-tag ok">本次会议数据: 已加载 (' +
      allData.current.contracts.length + ' 个合同)</span>';
    document.getElementById('lastUpload')?.classList.add('loaded');
    document.getElementById('currentUpload')?.classList.add('loaded');
  } else {
    tags += '<span class="status-tag warn">本次会议数据: 未加载</span>';
  }

  statusBar.innerHTML = tags;
}

function updateDateUI() {
  const stored = localStorage.getItem(LS_DATE);
  const picker = document.getElementById('datePicker');
  const source = document.getElementById('dateSource');

  if (stored) {
    picker.value = stored;
    source.textContent = '(上次保存的日期)';
  }
  if (allData.current?.date) {
    const d = strToDate(allData.current.date);
    if (d && !stored) {
      picker.value = d.toISOString().split('T')[0];
      source.textContent = '(从当前会议表格中自动提取: ' + allData.current.date + ')';
    }
  }
}

function generateDashboard() {
  // Parse files if not already parsed
  if (fileContents.last) {
    try {
      allData.last = parseWorkbook(fileContents.last, 'last');
      document.getElementById('lastUpload')?.classList.add('loaded');
    } catch(e) {
      alert('解析上次会议文件失败: ' + e.message);
      return;
    }
  }
  if (fileContents.current) {
    try {
      allData.current = parseWorkbook(fileContents.current, 'current');
      document.getElementById('currentUpload')?.classList.add('loaded');
    } catch(e) {
      alert('解析本次会议文件失败: ' + e.message);
      return;
    }
  }

  if (!allData.current) {
    alert('请至少上传本次会议数据');
    return;
  }

  // Override date from picker
  const dateVal = document.getElementById('datePicker')?.value;
  if (dateVal) {
    const d = new Date(dateVal + 'T00:00:00');
    const formatted = formatDate(d);
    if (allData.current) allData.current.date = formatted;
    if (allData.last) allData.last.date = formatted;
    localStorage.setItem(LS_DATE, dateVal);
  }

  saveToStorage();
  updatePrepUI();
  updateDateUI();
  switchTab('current');
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

  if (tab === 'prep') {
    document.querySelector('.tab-btn.prep').classList.add('active');
    document.getElementById('prepPage').classList.add('active');
    document.getElementById('app').style.display = 'none';
    updatePrepUI();
    updateDateUI();
  } else {
    document.querySelector('.tab-btn[onclick*="' + tab + '"]').classList.add('active');
    document.getElementById('prepPage').classList.remove('active');
    document.getElementById('app').style.display = '';
    if (allData[tab]) {
      render(tab);
    } else {
      document.getElementById('app').innerHTML = '<div class="empty-state"><div class="big-icon">📊</div><p>暂无数据</p><p style="font-size:13px">请先在"数据准备"页面上传 Excel 文件并点击"生成看板"</p></div>';
    }
  }
}

function data() { return allData[currentTab]; }

function render(tab) {
  const d = allData[tab];
  if (!d) return;
  document.getElementById('meetingDate').textContent = '会议日期: ' + (d.date || '未设置');

  let html = '';
  html += renderKPI(d);
  html += renderCompanyChart(d);
  html += renderDepartmentTable(d);
  html += renderChangeDetail(d);
  html += renderBottomSection(d);

  document.getElementById('app').innerHTML = html;

  setTimeout(() => {
    initCompanyChart(d);
    initDeptCharts(d);
  }, 100);

  bindFilters();
}

  const p4 = d.ppt_overview.p4_forecast;
  const fcTotal = p4.length > 0 ? (p4.find(r => r.dept === '合计') || p4[p4.length - 1]) : null;

  const selfRate = total ? total.self_rev_rate || '' : '';

  return `
  <div class="kpi-row">
    <div class="kpi-card">
      <div class="label">营收完成</div>
      <div class="value">${fmt(total ? total.revenue_current : 0)}<span class="unit">万元</span></div>
      <div class="sub">年度指标 ${fmt(total ? total.revenue_target : 0)}万 | 完成率 ${revRate}</div>
    </div>
    <div class="kpi-card">
      <div class="label">自营营收</div>
      <div class="value">${fmt(total ? total.self_rev_current : 0)}<span class="unit">万元</span></div>
      <div class="sub">年度指标 ${fmt(total ? total.self_rev_target : 0)}万 | 完成率 ${selfRate}</div>
    </div>
    <div class="kpi-card">
      <div class="label">累计收款</div>
      <div class="value">${fmt(total ? total.collection : 0)}<span class="unit">万元</span></div>
      <div class="sub">同比 ${p3.length > 1 ? p3[0].revenue_yoy || '-' : '-'}</div>
    </div>
    <div class="kpi-card ${fcTotal && fcTotal.full_year_rate && parseFloat(fcTotal.full_year_rate) < 0.7 ? 'warning' : 'success'}">
      <div class="label">全年预计营收</div>
      <div class="value">${fcTotal ? fmt(fcTotal.full_year_forecast) : '-'}<span class="unit">万元</span></div>
      <div class="sub">${fcTotal ? '指标占比 ' + (fcTotal.full_year_rate || '-') : ''}</div>
    </div>
    <div class="kpi-card">
      <div class="label">上期预测营收</div>
      <div class="value">${fcTotal ? fmt(fcTotal.prev_forecast) : '-'}<span class="unit">万元</span></div>
      <div class="sub">${fcTotal && fcTotal.prev_forecast > 0 ? '较上期 ' + (fcTotal.full_year_forecast > fcTotal.prev_forecast ? '↑ 上调' : '↓ 下调') : ''}</div>
    </div>

}

function fmt(n) {
  if (n == null || isNaN(n)) return '0';
  return parseFloat(n).toLocaleString('zh-CN', { maximumFractionDigits: 0 });
}

  const actualMonthly = new Array(12).fill(0);

  const colActualMonthly = new Array(12).fill(0);

  (d.contracts || []).forEach(c => {

    if (c.monthly_collection_plan) c.monthly_collection_plan.forEach((v, i) => { colPlanMonthly[i] += v; });
    if (c.monthly_collection_actual) c.monthly_collection_actual.forEach((v, i) => { colActualMonthly[i] += v; });
  });

  const months = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];

  chart.setOption({

    grid: { left: 60, right: 30, top: 40, bottom: 30 },
    xAxis: { type: 'category', data: months, axisLabel: { color: '#8fa4c4' }, axisLine: { lineStyle: { color: '#1e3a5f' } } },
    yAxis: { type: 'value', name: '万元', nameTextStyle: { color: '#8fa4c4' }, axisLabel: { color: '#8fa4c4' }, splitLine: { lineStyle: { color: '#1e3a5f' } } },

function renderDepartmentTable(d) {

  const p3 = d.ppt_overview.p3_revenue;
  const p4 = d.ppt_overview.p4_forecast;

  const deptData = {};
  deptOrder.forEach(dn => { deptData[dn] = { plan: new Array(12).fill(0), actual: new Array(12).fill(0), colPlan: new Array(12).fill(0), colActual: new Array(12).fill(0) }; });
  (d.contracts || []).forEach(c => {
    const dn = c.dept;
    if (!deptData[dn]) return;
    if (c.monthly_plan) c.monthly_plan.forEach((v, i) => { deptData[dn].plan[i] += v; });
    if (c.monthly_actual) c.monthly_actual.forEach((v, i) => { deptData[dn].actual[i] += v; });
    if (c.monthly_collection_plan) c.monthly_collection_plan.forEach((v, i) => { deptData[dn].colPlan[i] += v; });
    if (c.monthly_collection_actual) c.monthly_collection_actual.forEach((v, i) => { deptData[dn].colActual[i] += v; });
  });

  const transferData = computeTransferAnalysis(d);

  let rows = '';

        <strong>推迟到下月的计划值:</strong> ${td.outDetails.length > 0 ? td.outDetails.map(x => '→' + x.toMonth + '月转出 ' + fmt(x.amount) + '万').join('；') : '无'}

  return `

    <div class="section-title"><span class="dot">◆</span>部门明细</div>
    <div style="overflow-x:auto;">
      <table class="data-table">
        <thead>
          <tr>
            <th>部门</th><th>年度指标(万)</th><th>计划 vs 完成</th>
            <th>计划合计</th><th>完成合计</th>
            <th>转移出</th><th>转移入</th><th>展开</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

  const deptData = {};

function computeTransferAnalysis(d) {
  if (!allData || !allData.current || !allData.last) return {};

  const curContracts = allData.current.contracts || [];
  const lastContracts = allData.last.contracts || [];

  const lastByNo = {};
  lastContracts.forEach(c => { lastByNo[c.contract_no] = c; });

  const deptOrder = ['数字建造中心','智能运管中心','数智管理中心','福建分公司','广东分公司','产品研发中心','市场经营拓展中心'];
  const deptResult = {};
  deptOrder.forEach(dn => {
    deptResult[dn] = { transferIn: 0, transferOut: 0, inDetails: [], outDetails: [], changes: [] };
  });

  curContracts.forEach(cur => {
    const last = lastByNo[cur.contract_no];
    if (!last) return;

    const dept = cur.dept;
    if (!deptResult[dept]) return;

    for (let m = 0; m < 12; m++) {
      const delta = (cur.monthly_plan[m] || 0) - (last.monthly_plan[m] || 0);
      if (Math.abs(delta) < 0.01) continue;

      if (delta < 0) {
        let found = false;
        for (let n = m + 1; n < 12; n++) {
          const d2 = (cur.monthly_plan[n] || 0) - (last.monthly_plan[n] || 0);
          if (d2 > 0.01) {
            const transferAmt = Math.min(-delta, d2);
            deptResult[dept].transferOut += transferAmt;
            deptResult[dept].outDetails.push({
              contractName: cur.contract_name,
              fromMonth: m + 1, toMonth: n + 1, amount: transferAmt
            });
            deptResult[dept].changes.push({
              contractName: cur.contract_name, type: '推迟',
              fromMonth: m + 1, toMonth: n + 1, amount: transferAmt, isOut: true
            });
            found = true;
          }
        }
        if (!found) {
          deptResult[dept].changes.push({
            contractName: cur.contract_name, type: '删除',
            fromMonth: m + 1, toMonth: null, amount: -delta, isOut: true
          });
        }
      } else {
        let found = false;
        for (let n = 0; n < m; n++) {
          const d2 = (cur.monthly_plan[n] || 0) - (last.monthly_plan[n] || 0);
          if (d2 < -0.01) {
            const transferAmt = Math.min(delta, -d2);
            deptResult[dept].transferIn += transferAmt;
            deptResult[dept].inDetails.push({
              contractName: cur.contract_name,
              fromMonth: n + 1, toMonth: m + 1, amount: transferAmt
            });
            deptResult[dept].changes.push({
              contractName: cur.contract_name, type: '推迟',
              fromMonth: n + 1, toMonth: m + 1, amount: transferAmt, isIn: true
            });
            found = true;
          }
        }
        if (!found) {
          deptResult[dept].changes.push({
            contractName: cur.contract_name, type: '新增',
            fromMonth: null, toMonth: m + 1, amount: delta, isIn: true
          });
        }
      }
    }
  });

  Object.keys(deptResult).forEach(dn => {
    deptResult[dn].changes.sort((a, b) => b.amount - a.amount);
  });

  return deptResult;
}

function renderChangeDetail(d) {
  const td = computeTransferAnalysis(d);
  if (!td || Object.keys(td).length === 0) {
    return '<div class="section"><div class="section-title"><span class="dot">◆</span>计划转移明细</div><p style="color:var(--text-muted)">需要同时加载两次会议数据才能进行分析</p></div>';
  }

  let allChanges = [];
  Object.entries(td).forEach(([dept, data]) => {
    data.changes.forEach(c => { allChanges.push({ ...c, dept }); });
  });

  allChanges.sort((a, b) => b.amount - a.amount);

  let rows = '';
  allChanges.forEach(c => {
    const tagClass = c.type === '推迟' ? 'tag-postpone' : c.type === '新增' ? 'tag-new' : c.type === '删除' ? 'tag-delete' : 'tag-advance';
    rows += `
    <tr class="change-row" data-type="${c.type}">
      <td>${c.dept}</td>
      <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${esc(c.contractName)}">${c.contractName}</td>
      <td><span class="tag ${tagClass}">${c.type}</span></td>
      <td>${c.fromMonth ? c.fromMonth + '月' : '-'}</td>
      <td>${c.toMonth ? c.toMonth + '月' : '-'}</td>
      <td class="num">${fmt(c.amount)}</td>
      <td class="num">${fmt(c.type === '推迟' && c.isIn ? c.amount : 0)}</td>
      <td class="num">${fmt(c.type === '推迟' && c.isOut ? c.amount : 0)}</td>
    </tr>`;
  });

  return `
  <div class="section">
    <div class="section-title"><span class="dot">◆</span>计划转移明细 <span style="color:var(--text-muted);font-size:12px;">（按金额降序）</span></div>
    <div class="filter-bar">
      <button class="filter-btn active" onclick="filterChanges('全部', this)">全部</button>
      <button class="filter-btn" onclick="filterChanges('推迟', this)">推迟</button>
      <button class="filter-btn" onclick="filterChanges('新增', this)">新增</button>
      <button class="filter-btn" onclick="filterChanges('删除', this)">删除</button>
      <button class="filter-btn" onclick="filterChanges('提前', this)">提前</button>
    </div>
    <div style="overflow-x:auto;">
      <table class="data-table">
        <thead>
          <tr>
            <th>部门</th><th>合同名称</th><th>变化类型</th>
            <th>原计划月</th><th>目标月</th><th>金额(万)</th>
            <th>推迟→本月</th><th>推迟→下月</th>
          </tr>
        </thead>
        <tbody>${rows || '<tr><td colspan="8" style="text-align:center;color:var(--text-muted);">暂无变化数据</td></tr>'}</tbody>
      </table>
    </div>
  </div>`;
}

function filterChanges(type, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.change-row').forEach(row => {
    if (type === '全部') { row.style.display = ''; }
    else { row.style.display = row.dataset.type === type ? '' : 'none'; }
  });
}

function renderContractMatch(d) {
  if (!allData || !allData.current || !allData.last) return '';

  const curContracts = allData.current.contracts || [];
  const lastContracts = allData.last.contracts || [];

  const curByNo = {};
  curContracts.forEach(c => { if (c.contract_no) curByNo[c.contract_no] = c; });
  const lastByNo = {};
  lastContracts.forEach(c => { if (c.contract_no) lastByNo[c.contract_no] = c; });

  const matchedNos = new Set();
  Object.keys(curByNo).forEach(no => { if (lastByNo[no]) matchedNos.add(no); });

  const onlyCurrent = curContracts.filter(c => c.contract_no && !lastByNo[c.contract_no]);
  const onlyLast = lastContracts.filter(c => c.contract_no && !curByNo[c.contract_no]);

  const fuzzyMatches = [];
  const unmatched = [];

  onlyCurrent.forEach(cur => {
    let bestMatch = null;
    let bestScore = 0;
    onlyLast.forEach(last => {
      const score = nameSimilarity(cur.contract_name, last.contract_name);
      if (score > bestScore) { bestScore = score; bestMatch = last; }
    });

    const amountDiff = bestMatch ? Math.abs(cur.contract_amount - bestMatch.contract_amount) / Math.max(cur.contract_amount, 1) : 1;

    if (bestScore > 0.6 && amountDiff < 0.15) {
      fuzzyMatches.push({ cur, last: bestMatch, score: bestScore, amountDiff });
    } else if (bestScore > 0.35 && amountDiff < 0.3) {
      fuzzyMatches.push({ cur, last: bestMatch, score: bestScore, amountDiff, uncertain: true });
    } else {
      unmatched.push({ cur, bestMatch, score: bestScore });
    }
  });

  const confident = fuzzyMatches.filter(m => !m.uncertain);
  const uncertain = fuzzyMatches.filter(m => m.uncertain);

  let matchRows = '';
  confident.forEach(m => {
    matchRows += `<tr>
      <td style="color:var(--success)">✓ 自动匹配</td>
      <td title="${esc(m.cur.contract_name)}">${trunc(m.cur.contract_name, 30)}</td>
      <td class="num">${fmt(m.cur.contract_amount)}</td>
      <td title="${esc(m.last.contract_name)}">${trunc(m.last.contract_name, 30)}</td>
      <td class="num">${fmt(m.last.contract_amount)}</td>
      <td class="num">${(m.score*100).toFixed(0)}%</td>
      <td class="num">${(m.amountDiff*100).toFixed(0)}%</td>
    </tr>`;
  });

  uncertain.forEach(m => {
    matchRows += `<tr>
      <td style="color:var(--warning)">⚠ 待确认</td>
      <td title="${esc(m.cur.contract_name)}">${trunc(m.cur.contract_name, 30)}</td>
      <td class="num">${fmt(m.cur.contract_amount)}</td>
      <td title="${esc(m.last.contract_name)}">${trunc(m.last.contract_name, 30)}</td>
      <td class="num">${fmt(m.last.contract_amount)}</td>
      <td class="num">${(m.score*100).toFixed(0)}%</td>
      <td class="num">${(m.amountDiff*100).toFixed(0)}%</td>
    </tr>`;
  });

  return `
  <div class="section">
    <div class="section-title"><span class="dot">◆</span>待签合同匹配报告</div>
    <div style="margin-bottom:12px;font-size:13px;color:var(--text-secondary);">
      完全匹配: <b style="color:var(--success)">${matchedNos.size}</b> 个（合同编号一致）&nbsp;&nbsp;
      自动匹配: <b style="color:var(--success)">${confident.length}</b> 个（名称+金额相似）&nbsp;&nbsp;
      待确认: <b style="color:var(--warning)">${uncertain.length}</b> 个 &nbsp;&nbsp;
      未匹配: <b style="color:var(--danger)">${unmatched.length}</b> 个（本次新增）
    </div>
    ${matchRows ? `
    <div style="overflow-x:auto;">
      <table class="data-table">
        <thead><tr><th>状态</th><th>本次合同</th><th>金额(万)</th><th>匹配上次合同</th><th>金额(万)</th><th>名称相似度</th><th>金额差异</th></tr></thead>
        <tbody>${matchRows}</tbody>
      </table>
    </div>` : '<p style="color:var(--text-muted);">无需匹配，所有合同已通过编号关联</p>'}
  </div>`;
}

function toggleExpand(btn, rowId) {
  const row = document.getElementById(rowId);
  if (!row) return;
  const isOpen = row.classList.contains('open');
  row.classList.toggle('open', !isOpen);
  btn.textContent = isOpen ? '▶' : '▼';
}

function nameSimilarity(a, b) {
  if (!a || !b) return 0;
  const norm = s => s.replace(/[（(].*?[)）]/g, '').replace(/[，,、。；;：:\-_/\\]/g, '').replace(/\s+/g, '').toLowerCase();
  const na = norm(a);
  const nb = norm(b);
  if (na === nb) return 1.0;

  const grams = s => { const g = new Set(); for (let i = 0; i < s.length - 1; i++) g.add(s.substring(i, i + 2)); return g; };
  const ga = grams(na);
  const gb = grams(nb);
  let intersection = 0;
  ga.forEach(g => { if (gb.has(g)) intersection++; });
  const union = ga.size + gb.size - intersection;
  return union > 0 ? intersection / union : 0;
}

function esc(s) { return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function trunc(s, n) { return s && s.length > n ? s.substring(0, n) + '...' : (s || ''); }
